# ----------------------------------------------------------
# Project Details
# ----------------------------------------------------------
project_name: "EvoNet: Evolutionary Neural Network"
github_repo: "https://github.com/ayushmantrivedi/evolutionary-neural-network"
project_description: >
  EvoNet is an open-source neural network framework that replaces
  traditional backpropagation with evolutionary algorithms for training.
  Key innovations include: GPU-accelerated population-based training
  (PyTorch/CUDA), Simulated Binary Crossover (SBX) for genetic
  recombination, CMA-ES adaptive mutation that learns the mutation
  landscape, tournament selection, and ResNet-style skip connections.
  The framework maintains a population of 50 neuron variants per neuron,
  evaluated in parallel on GPU, combining global evolutionary search
  with local gradient-based refinement. Particularly suited for
  non-differentiable objective functions, sparse rewards, and
  hyperparameter optimisation. Built in Python with PyTorch.
target_company_domain: "AI research, evolutionary computation, neural architecture search, reinforcement learning, ML infrastructure, deep learning frameworks"
developer_name: "Ayushman Trivedi"
developer_title: "AI/ML Developer & Researcher"
developer_linkedin: "https://linkedin.com/in/ayushmantrivedi"

